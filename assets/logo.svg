<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 356 72">
  <defs>
    <radialGradient id="b1" cx="38%" cy="32%">
      <stop offset="0%" stop-color="#2255cc"/>
      <stop offset="100%" stop-color="#001580"/>
    </radialGradient>
    <radialGradient id="b2" cx="38%" cy="32%">
      <stop offset="0%" stop-color="#1a4db8"/>
      <stop offset="100%" stop-color="#001070"/>
    </radialGradient>
    <radialGradient id="star1" cx="38%" cy="32%">
      <stop offset="0%" stop-color="#ffe066"/>
      <stop offset="100%" stop-color="#cc8800"/>
    </radialGradient>
    <radialGradient id="shine" cx="35%" cy="28%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.4)"/>
      <stop offset="65%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- === 5 boules bleues === -->
  <!-- Boule 1 -->
  <circle cx="30" cy="36" r="26" fill="url(#b1)"/>
  <ellipse cx="23" cy="24" rx="9" ry="7" fill="url(#shine)"/>
  <circle cx="30" cy="36" r="26" fill="none" stroke="#1a3a99" stroke-width="1.5"/>
  <text x="30" y="42" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="white">N</text>

  <!-- Boule 2 -->
  <circle cx="84" cy="36" r="26" fill="url(#b2)"/>
  <ellipse cx="77" cy="24" rx="9" ry="7" fill="url(#shine)"/>
  <circle cx="84" cy="36" r="26" fill="none" stroke="#1a3a99" stroke-width="1.5"/>
  <text x="84" y="42" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="white">N</text>

  <!-- Boule 3 -->
  <circle cx="138" cy="36" r="26" fill="url(#b1)"/>
  <ellipse cx="131" cy="24" rx="9" ry="7" fill="url(#shine)"/>
  <circle cx="138" cy="36" r="26" fill="none" stroke="#1a3a99" stroke-width="1.5"/>
  <text x="138" y="42" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="white">N</text>

  <!-- Boule 4 -->
  <circle cx="192" cy="36" r="26" fill="url(#b2)"/>
  <ellipse cx="185" cy="24" rx="9" ry="7" fill="url(#shine)"/>
  <circle cx="192" cy="36" r="26" fill="none" stroke="#1a3a99" stroke-width="1.5"/>
  <text x="192" y="42" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="white">N</text>

  <!-- Boule 5 -->
  <circle cx="246" cy="36" r="26" fill="url(#b1)"/>
  <ellipse cx="239" cy="24" rx="9" ry="7" fill="url(#shine)"/>
  <circle cx="246" cy="36" r="26" fill="none" stroke="#1a3a99" stroke-width="1.5"/>
  <text x="246" y="42" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="white">N</text>

  <!-- Séparateur -->
  <line x1="280" y1="12" x2="280" y2="60" stroke="#dde3f5" stroke-width="1.5"/>

  <!-- === 2 étoiles dorées === -->
  <!-- Étoile 1 -->
  <circle cx="299" cy="36" r="22" fill="url(#star1)"/>
  <ellipse cx="292" cy="25" rx="8" ry="6" fill="rgba(255,255,255,0.35)"/>
  <circle cx="299" cy="36" r="22" fill="none" stroke="#b87700" stroke-width="1.5"/>
  <!-- pentagramme étoile -->
  <polygon points="299,20 302,29 312,29 304,35 307,44 299,38 291,44 294,35 286,29 296,29"
           fill="white" opacity="0.92"/>

  <!-- Étoile 2 -->
  <circle cx="330" cy="36" r="22" fill="url(#star1)"/>
  <ellipse cx="323" cy="25" rx="8" ry="6" fill="rgba(255,255,255,0.35)"/>
  <circle cx="330" cy="36" r="22" fill="none" stroke="#b87700" stroke-width="1.5"/>
  <polygon points="330,20 333,29 343,29 335,35 338,44 330,38 322,44 325,35 317,29 327,29"
           fill="white" opacity="0.92"/>
</svg>
